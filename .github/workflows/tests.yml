name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Ana test matrisi ────────────────────────────────────────────────────
  # Linux BİLEREK var: deploy hedefi (Streamlit Cloud) Linux ve PDF font
  # sorunu yalnızca orada ortaya çıkıyordu. Windows geliştirme makinesi.
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # Türkçe karakterli PDF için TrueType font. packages.txt ile aynı paket —
      # Streamlit Cloud'daki ortamı burada birebir taklit ediyoruz.
      - name: Türkçe uyumlu font kur (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core

      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Testler
        run: python -m pytest tests/ -q

      # Hangi fontun seçildiği ve ₺ glyph'inin olup olmadığı platforma göre
      # değişiyor (Windows'ta Arial, Linux'ta DejaVu). Testler her iki durumda
      # da geçiyor — rapor gerekirse TL'ye düşüyor — ama hangi durumda
      # olduğumuzu bilmek istiyoruz. Bu adım cevabı loga yazar.
      # NOT: cikti ASCII olmali. Ilk surumu '₺' karakterini basiyordu ve
      # Windows runner'inin cp1252 konsolu bunu kaldiramayip UnicodeEncodeError
      # ile isi dusurdu. Karakterin kendisi yerine kod noktasi yaziliyor.
      - name: PDF font ve para birimi kararı (bilgi)
        run: |
          python -c "
          from modules import report
          lira = chr(0x20BA)
          print('font           :', report._FONT)
          print('U+20BA glyph   :', report._font_has(lira))
          print('secilen simge  :', 'U+20BA' if report._usable_symbol(lira) == lira else 'TL')
          "

  # ── Numba hızlandırma yolu ──────────────────────────────────────────────
  # Ayrı iş, çünkü numba opsiyonel: ana matris onsuz da yeşil kalmalı.
  # Buradaki amaç JIT çekirdeğinin gerçekten derlenip NumPy ile bit-bit aynı
  # sonucu verdiğini kanıtlamak — uzun süre hiç koşmamış koddu.
  numba:
    name: numba JIT yolu · ubuntu · py3.13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Bağımlılıklar (+ numba)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest numba

      - name: JIT gerçekten devrede mi
        run: |
          python -c "from utils.performance_utils import HAS_NUMBA, ACCELERATION; \
                     assert HAS_NUMBA, 'numba kurulu ama devreye girmedi'; \
                     print('hızlandırma:', ACCELERATION)"

      - name: Testler (derlenmiş çekirdekle)
        run: python -m pytest tests/test_finance_math.py -q

  # ── HTTP API ────────────────────────────────────────────────────────────
  # Ayrı iş, çünkü fastapi/uvicorn opsiyonel: Streamlit dağıtımı bunlara
  # ihtiyaç duymuyor ve ana matris onlarsız da yeşil kalmalı.
  api:
    name: HTTP API · ubuntu · py3.13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Bağımlılıklar (+ API)
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core
          pip install -r requirements-api.txt
          pip install pytest httpx

      - name: API testleri
        run: python -m pytest tests/test_api.py -q

      # TestClient gerçek sunucu değil. Uvicorn'un fiilen ayağa kalktığını
      # ve HTTP'den yanıt verdiğini ayrıca doğruluyoruz.
      - name: Uvicorn gerçekten ayağa kalkıyor mu
        run: |
          python -m uvicorn api:app --host 127.0.0.1 --port 8010 --log-level warning &
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8010/health | grep -q ok; then
              echo "API ayakta"
              curl -sf -X POST http://127.0.0.1:8010/simulate \
                -H "Content-Type: application/json" \
                -d '{"current_cash":4200000,"monthly_revenue":6800000,"monthly_fixed_expense":5950000}' \
                | grep -q ruin_probability && echo "simulate yanit verdi" && exit 0
              echo "simulate beklenen alani dondurmedi"; exit 1
            fi
            sleep 2
          done
          echo "API 40 sn icinde yanit vermedi"; exit 1

  # ── Uygulama gerçekten ayağa kalkıyor mu ────────────────────────────────
  # Testler matematiği doğruluyor ama app.py'nin import zamanı hatası (yanlış
  # Streamlit API'si, eksik modül) hiçbir teste yakalanmıyordu.
  smoke:
    name: app.py yüklenebiliyor mu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core
          pip install -r requirements.txt

      - name: Streamlit uygulamasını başlat ve yanıt aldığını doğrula
        run: |
          python -m streamlit run app.py --server.headless true --server.port 8501 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health | grep -q ok; then
              echo "uygulama ayakta"; exit 0
            fi
            sleep 2
          done
          echo "uygulama 60 sn içinde yanıt vermedi"; exit 1
